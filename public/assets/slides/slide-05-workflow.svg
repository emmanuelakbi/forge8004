  <circle cx="640" cy="500" r="350" fill="#8B5CF6" fill-opacity="0.06"/>
  <rect x="24" y="24" width="1232" height="672" stroke="#FFFFFF" stroke-opacity="0.05"/>

  <text x="48" y="56" fill="#8B5CF6" font-family="monospace" font-size="11" letter-spacing="0.2em">05</text>
  <text x="48" y="110" fill="#FFFFFF" font-family="monospace" font-size="28" font-weight="700">HOW IT WORKS</text>
  <text x="48" y="137" fill="#A1A1AA" font-family="monospace" font-size="13">EVERY AGENT SEQUENCE FOLLOWS THE SAME READABLE PATH</text>

  <!-- 5 step cards in a row -->
  <!-- Step 01 -->
  <rect x="48" y="185" width="224" height="430" fill="rgba(18,11,27,0.82)" stroke="rgba(139,92,246,0.24)"/>
  <rect x="72" y="210" width="36" height="36" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.24)"/>
  <text x="90" y="234" fill="#8B5CF6" font-family="monospace" font-size="10" font-weight="700" text-anchor="middle">01</text>
  <text x="72" y="275" fill="#FFFFFF" font-family="monospace" font-size="14" font-weight="700">SIGNAL</text>
  <text x="72" y="300" fill="#A1A1AA" font-family="monospace" font-size="11">THE SYSTEM DECIDES</text>
  <text x="72" y="318" fill="#A1A1AA" font-family="monospace" font-size="11">WHETHER IT WANTS</text>
  <text x="72" y="336" fill="#A1A1AA" font-family="monospace" font-size="11">TO ACT.</text>

  <!-- Step 02 -->
  <rect x="288" y="185" width="224" height="430" fill="rgba(18,11,27,0.82)" stroke="rgba(139,92,246,0.24)"/>
  <rect x="312" y="210" width="36" height="36" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.24)"/>
  <text x="330" y="234" fill="#8B5CF6" font-family="monospace" font-size="10" font-weight="700" text-anchor="middle">02</text>
  <text x="312" y="275" fill="#FFFFFF" font-family="monospace" font-size="14" font-weight="700">SIZING</text>
  <text x="312" y="300" fill="#A1A1AA" font-family="monospace" font-size="11">REQUESTED CAPITAL</text>
  <text x="312" y="318" fill="#A1A1AA" font-family="monospace" font-size="11">IS COMPARED AGAINST</text>
  <text x="312" y="336" fill="#A1A1AA" font-family="monospace" font-size="11">SAFE LIMITS.</text>

  <!-- Step 03 -->
  <rect x="528" y="185" width="224" height="430" fill="rgba(18,11,27,0.82)" stroke="rgba(139,92,246,0.24)"/>
  <rect x="552" y="210" width="36" height="36" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.24)"/>
  <text x="570" y="234" fill="#8B5CF6" font-family="monospace" font-size="10" font-weight="700" text-anchor="middle">03</text>
  <text x="552" y="275" fill="#FFFFFF" font-family="monospace" font-size="14" font-weight="700">ROUTING</text>
  <text x="552" y="300" fill="#A1A1AA" font-family="monospace" font-size="11">THE RISK ROUTER</text>
  <text x="552" y="318" fill="#A1A1AA" font-family="monospace" font-size="11">APPROVES, BLOCKS,</text>
  <text x="552" y="336" fill="#A1A1AA" font-family="monospace" font-size="11">OR HOLDS.</text>

  <!-- Step 04 -->
  <rect x="768" y="185" width="224" height="430" fill="rgba(18,11,27,0.82)" stroke="rgba(139,92,246,0.24)"/>
  <rect x="792" y="210" width="36" height="36" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.24)"/>
  <text x="810" y="234" fill="#8B5CF6" font-family="monospace" font-size="10" font-weight="700" text-anchor="middle">04</text>
  <text x="792" y="275" fill="#FFFFFF" font-family="monospace" font-size="14" font-weight="700">EXECUTION</text>
  <text x="792" y="300" fill="#A1A1AA" font-family="monospace" font-size="11">THE OUTCOME IS</text>
  <text x="792" y="318" fill="#A1A1AA" font-family="monospace" font-size="11">SHOWN IN PLAIN</text>
  <text x="792" y="336" fill="#A1A1AA" font-family="monospace" font-size="11">LANGUAGE.</text>

  <!-- Step 05 -->
  <rect x="1008" y="185" width="224" height="430" fill="rgba(18,11,27,0.82)" stroke="rgba(139,92,246,0.24)"/>
  <rect x="1032" y="210" width="36" height="36" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.24)"/>
  <text x="1050" y="234" fill="#8B5CF6" font-family="monospace" font-size="10" font-weight="700" text-anchor="middle">05</text>
  <text x="1032" y="275" fill="#FFFFFF" font-family="monospace" font-size="14" font-weight="700">HISTORY</text>
  <text x="1032" y="300" fill="#A1A1AA" font-family="monospace" font-size="11">A TIMELINE IS SAVED</text>
  <text x="1032" y="318" fill="#A1A1AA" font-family="monospace" font-size="11">SO PEOPLE CAN</text>
  <text x="1032" y="336" fill="#A1A1AA" font-family="monospace" font-size="11">REVIEW LATER.</text>

  <line x1="48" y1="670" x2="1232" y2="670" stroke="rgba(255,255,255,0.06)"/>
