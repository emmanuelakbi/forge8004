  <circle cx="640" cy="360" r="300" fill="#10B981" fill-opacity="0.06"/>
  <rect x="24" y="24" width="1232" height="672" stroke="#FFFFFF" stroke-opacity="0.05"/>

  <text x="48" y="56" fill="#10B981" font-family="monospace" font-size="11" letter-spacing="0.2em">04</text>
  <text x="48" y="110" fill="#FFFFFF" font-family="monospace" font-size="28" font-weight="700">INSIDE THE WORKSPACE</text>
  <text x="48" y="137" fill="#A1A1AA" font-family="monospace" font-size="13">CONNECTED VIEWS, NOT JUST ONE DASHBOARD SCREEN</text>

  <!-- 4 feature panels (2x2) -->
  <rect x="48" y="175" width="580" height="210" fill="rgba(10,21,18,0.78)" stroke="rgba(16,185,129,0.28)"/>
  <text x="72" y="210" fill="#10B981" font-family="monospace" font-size="10" letter-spacing="0.2em">SIGNALS</text>
  <text x="72" y="240" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">SHOWS WHAT THE SYSTEM WANTED TO DO,</text>
  <text x="72" y="260" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">IN PLAIN LANGUAGE.</text>

  <rect x="648" y="175" width="584" height="210" fill="rgba(10,21,18,0.78)" stroke="rgba(16,185,129,0.28)"/>
  <text x="672" y="210" fill="#10B981" font-family="monospace" font-size="10" letter-spacing="0.2em">SAFETY</text>
  <text x="672" y="240" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">SHOWS WHEN THE ROUTER ALLOWED, HELD,</text>
  <text x="672" y="260" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">OR BLOCKED AN ACTION.</text>

  <rect x="48" y="405" width="580" height="210" fill="rgba(10,21,18,0.78)" stroke="rgba(16,185,129,0.28)"/>
  <text x="72" y="440" fill="#10B981" font-family="monospace" font-size="10" letter-spacing="0.2em">CAPITAL</text>
  <text x="72" y="470" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">SHOWS WHAT IS FREE, WHAT IS DEPLOYED,</text>
  <text x="72" y="490" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">AND WHAT STAYED PROTECTED.</text>

  <rect x="648" y="405" width="584" height="210" fill="rgba(10,21,18,0.78)" stroke="rgba(16,185,129,0.28)"/>
  <text x="672" y="440" fill="#10B981" font-family="monospace" font-size="10" letter-spacing="0.2em">HISTORY</text>
  <text x="672" y="470" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">SHOWS THE SEQUENCE TRAIL SO REVIEWS</text>
  <text x="672" y="490" fill="#D4D4D8" font-family="monospace" font-size="12" letter-spacing="0.08em">ARE EASIER LATER ON.</text>

  <line x1="48" y1="670" x2="1232" y2="670" stroke="rgba(255,255,255,0.06)"/>
  <text x="48" y="695" fill="#71717A" font-family="monospace" font-size="11" letter-spacing="0.15em">FORGE8004</text>
